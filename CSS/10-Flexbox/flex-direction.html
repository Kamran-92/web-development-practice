<head>

    <title>Flex-direction</title>
</head>
<style>
    div{
        display: flex;
        flex-direction: row-reverse;
    }
 #container{
    background-color: bisque;
    height: 400px;
    width: 500px;
    border: 3px solid black;
    
  
    
 }
 #box1{
     background-color: rgb(205, 255, 196);
    height: 100px;
    width: 100px;
    border: 3px solid black;
    
 }
 #box2{
      background-color: rgb(196, 230, 255);
    height: 100px;
    width: 100px;
    border: 3px solid black;
     
 }
 #box3{
      background-color: rgb(251, 196, 255);
    height: 100px;
    width: 100px;
    border: 3px solid black;
     
   
 }
</style>
<body>
    <div id="container"> flex container
    <div id="box1">box1</div>
    <div id="box2">box2</div>
    <div id="box3">box3</div>
    </div>
</body>
</html>
