<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background-color</title>
</head>
<style>
p{
    background-color: aquamarine;
}
</style>

    <h1>background-color</h1>
    <p>
        Always set a fallback color when using background images in case the image fails to load.

    </p>
