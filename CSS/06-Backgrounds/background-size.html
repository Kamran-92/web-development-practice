<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background-size</title>
</head>
<style>
body{
    background-image: url(https://images.unsplash.com/photo-1541348263662-e068662d82af?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
    
    background-size: contain ;
    background-repeat: no-repeat;
}
h1,p{
    color: azure;
}
</style>
<body>
    <h1>background-size</h1>
    
    <p>'cover' scales the image to fill the container completely (which may crop the edges).
    'contain' scales the image so it remains fully visible (which may leave empty space). Can also accept explicit dimensions like percentages or pixels (e.g., 100% 100%).</p>
</body>
</html>
