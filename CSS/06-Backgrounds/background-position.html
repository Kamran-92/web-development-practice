<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background-position</title>
</head>
<style>
body{
    background-image: url(https://images.unsplash.com/photo-1541348263662-e068662d82af?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
    
    background-size: cover ;
    background-repeat: no-repeat;
    background-position: center;
}
h1,p{
    color: azure;
}

</style>
<body>
    <h1>background-position</h1>
    <p>Dictates where the background starts; defaults to the top-left corner (0 0).
     Can be set using keywords (center, bottom right), percentages (50% 50%), or exact pixel values.</p>
</body>
</html>
