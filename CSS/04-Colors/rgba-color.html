<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGBA</title>
</head>
<style>
p{
    background-color: rgba(55,45,111, 0.5);
    font-size: x-large;
}
</style>
<body>
    <h1>RGBA</h1>
    <p>Definition: The exact same as RGB, but with an added "Alpha" channel (from 0.0 to 1.0) to control transparency.
Best for: Creating semi-transparent backgrounds, overlays, or shadows where you need the background to show through without making the text inside the element transparent.</p>
</body>
</html>
