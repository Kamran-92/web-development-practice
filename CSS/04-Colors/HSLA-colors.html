<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSLA Colors</title>
</head>
<body>
    <style>
        p{
          color: hsla(0, 100%, 50%, 0.5);
        }
    </style>
    <h1>HSLA Colors</h1>
    <p>Definition: The HSL format with an added Alpha channel for opacity.
Best for: Combining the theme-building ease of HSL with the need for transparent elements, like a glass-morphism UI that strictly follows a brand's hue.</p>
</body>
</html>
