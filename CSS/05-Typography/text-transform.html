<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text-transform</title>
</head>
<style>
h1{
    text-transform: capitalize;
}
p{
    text-transform: uppercase;
}
</style>
<body>
    <h1>text-transform</h1>
    <p>Changes the capitalization (uppercase, lowercase, capitalize).
       Allows you to style headings without altering the underlying HTML text.</p>
</body>
</html>
