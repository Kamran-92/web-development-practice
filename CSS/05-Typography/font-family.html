<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font-family</title>
</head>
<style>
h1{
    font-family: cursive;
}
p{
    font-size: x-large;
    text-align: center;
    background-color: aquamarine;

</style>
<body>
    <h1>font-family</h1>
    <p>
        Sets the specific typeface (e.g., "Open Sans", sans-serif).
    Always include generic fallback fonts in case the primary fails.
    </p>
</body>
</html>
