<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font-style</title>
</head>
<style>
p{
    font-style: oblique;
}
</style>
<body>
    <h1>font-style</h1>
    <p>
        Primarily used to make text appear *italic* or oblique.
        Great for emphasizing quotes or highlighting specific terms.
    </p>
</body>
</html>
