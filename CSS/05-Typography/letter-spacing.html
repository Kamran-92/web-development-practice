<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>letter-spacing</title>
</head>
<style>
h1{
    letter-spacing: 15px;
}
p{
    letter-spacing: 5px;
}
</style>
<body>
    <h1>letter-spacing</h1>
    <p>Adjusts the horizontal space between individual characters.
    Often used sparingly to improve legibi lity on all-caps headings</p>
</body>
</html>
