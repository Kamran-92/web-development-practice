<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text-decoration</title>
</head>
<style>
h1{
text-decoration: overline;
}
p{
    text-decoration: underline;
}
</style>
<body>
    <h1>text-decoration</h1>
    <p>Adds lines to text (underline, overline, line-through).
       Most commonly used to style—or remove default styling from—links.</p>
</body>
</html>
