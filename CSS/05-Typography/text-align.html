<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text-align</title>
</head>
<style>
p{
    text-align: center;
}
h2{
    text-align: right;
}
</style>
<body>
    <h1>text-align</h1>
    <p>
        Controls the horizontal alignment (left, right, center, justify).
        Left-alignment is generally the easiest to read for long paragraphs.
    </p>

    <h2>
        heelo 
    </h2>
</body>
</html>
