<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font-size</title>
</head>
<style>
p{
    font-size: larger;
}
h1{
    font-size: small;
}
</style>
<body>
    <h1>font-size</h1>
    <p>
    Controls how large the text renders on the screen.
    Use relative units like `rem` or `em` for better accessibility
    </p>
</body>
</html>
