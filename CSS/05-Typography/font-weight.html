<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font-weight</title>
</head>
<style>
p{
    font-weight: 700;
}
</style>
<body>
    <h1>font-weight</h1>
    <p>
        Determines the thickness or boldness of the characters.
        Common values map to numbers: normal (400) and bold (700)
        value 100 to 900.
    </p>
