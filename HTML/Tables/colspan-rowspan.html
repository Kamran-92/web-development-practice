<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colspan | Rowspan</title>
</head>
<body>
    <table border="4">
        <tr >
            <th colspan="3">
             Student Record
        </th>
    </tr>
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Marks</th>
    </tr>
    <tbody>
        <tr>
            <td >
              245
            </td>
            <td rowspan="2">
                Syed Muhammad Barakallah
            </td>
            <td>85</td>

        </tr>
        <tr>
            <td>245</td>
            <td>85</td>
        </tr>
    </tbody>
    </table>
</body>
</html>
